name: Codespell (Reusable)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  codespell:
    name: Codespell
    runs-on: arc-runner-set
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - run: make verify-codespell
